# ============================================================
# 牛油果零壹信奥 — Nginx 配置
# 服务器: 47.101.55.91
# 目录结构:
#   /var/www/avocado-home-page/  ← 官网静态文件（dist/ 内容）
#   /var/www/oj/                 ← 做题网（未来）
#   /var/www/api/                ← API 服务（未来）
# ============================================================

server {
    listen 80;
    # 备案前用 IP，备案后加入域名：
    # server_name 47.101.55.91 avocadozero.cn www.avocadozero.cn;
    server_name 47.101.55.91;

    # ---------- 官网（静态文件） ----------
    root /var/www/avocado-home-page;
    index index.html;

    # 静态资源长期缓存（带 hash 的文件名）
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 图片资源
    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # favicon / robots
    location = /favicon.svg {
        expires 1d;
    }
    location = /robots.txt {
        expires 1d;
    }

    # ---------- 做题网（未来启用，取消注释即可）----------
    # location /oj {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ---------- API（未来启用，取消注释即可）----------
    # location /api {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ---------- 兜底：所有其他请求走 Astro 的静态 HTML ----------
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 512;
}
